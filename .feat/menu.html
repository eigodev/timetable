<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>menu</title>
</head>
<body>

				<path d="M18.75 6.75h1.875c.621 0 1.125.504 1.125 1.125V18a1.5 1.5 0 0 1-3 0V6.75Z" />
			</svg>		   
		</button>
		<button type="button" class="activity-btn option-btn second-btn" id="fill-in-the-blank" aria-label="Fill in the Blank">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="currentColor" class="size-4">
				<path fill-rule="evenodd" d="M2.25 6a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V6Zm3.97.97a.75.75 0 0 1 1.06 0l2.25 2.25a.75.75 0 0 1 0 1.06l-2.25 2.25a.75.75 0 0 1-1.06-1.06l1.72-1.72-1.72-1.72a.75.75 0 0 1 0-1.06Zm4.28 4.28a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5h-3Z" clip-rule="evenodd" />
			</svg>		   
		</button>
		<button type="button" class="activity-btn option-btn third-btn" id="multiple-choice" aria-label="Multiple Choice">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="currentColor" class="size-4">
				<path fill-rule="evenodd" d="M1.5 7.125c0-1.036.84-1.875 1.875-1.875h6c1.036 0 1.875.84 1.875 1.875v3.75c0 1.036-.84 1.875-1.875 1.875h-6A1.875 1.875 0 0 1 1.5 10.875v-3.75Zm12 1.5c0-1.036.84-1.875 1.875-1.875h5.25c1.035 0 1.875.84 1.875 1.875v8.25c0 1.035-.84 1.875-1.875 1.875h-5.25a1.875 1.875 0 0 1-1.875-1.875v-8.25ZM3 16.125c0-1.036.84-1.875 1.875-1.875h5.25c1.036 0 1.875.84 1.875 1.875v2.25c0 1.035-.84 1.875-1.875 1.875h-5.25A1.875 1.875 0 0 1 3 18.375v-2.25Z" clip-rule="evenodd" />
			</svg>					 
		</button>
		<button type="button" class="activity-btn option-btn fourth-btn" id="conversation-ordering" aria-label="Conversation Ordering">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="currentColor" class="size-4">
				<path d="M5.625 3.75a2.625 2.625 0 1 0 0 5.25h12.75a2.625 2.625 0 0 0 0-5.25H5.625ZM3.75 11.25a.75.75 0 0 0 0 1.5h16.5a.75.75 0 0 0 0-1.5H3.75ZM3 15.75a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75ZM3.75 18.75a.75.75 0 0 0 0 1.5h16.5a.75.75 0 0 0 0-1.5H3.75Z" />
			</svg>					 
		</button>
		<button type="button" class="activity-btn option-btn fifth-btn" id="image-upload" aria-label="Image Upload">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
				<path fill-rule="evenodd" d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6ZM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.061Zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z" clip-rule="evenodd" />
			</svg>
		</button>
		<button type="button" class="activity-btn option-btn sixth-btn" id="audio-upload" aria-label="Audio Upload">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
				<path fill-rule="evenodd" d="M19.952 1.651a.75.75 0 0 1 .298.599V16.303a3 3 0 0 1-2.176 2.884l-1.32.377a2.553 2.553 0 1 1-1.403-4.909l2.311-.66a1.5 1.5 0 0 0 1.088-1.442V6.994l-9 2.572v9.737a3 3 0 0 1-2.176 2.884l-1.32.377a2.553 2.553 0 1 1-1.402-4.909l2.31-.66a1.5 1.5 0 0 0 1.088-1.442V5.25a.75.75 0 0 1 .544-.721l10.5-3a.75.75 0 0 1 .658.122Z" clip-rule="evenodd" />
			</svg>
		</button>
		<button type="button" class="activity-btn option-btn seventh-btn" id="video-upload" aria-label="Video Upload">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
				<path fill-rule="evenodd" d="M14.447 3.026a.75.75 0 0 1 .527.921l-4.5 16.5a.75.75 0 0 1-1.448-.394l4.5-16.5a.75.75 0 0 1 .921-.527ZM16.72 6.22a.75.75 0 0 1 1.06 0l5.25 5.25a.75.75 0 0 1 0 1.06l-5.25 5.25a.75.75 0 1 1-1.06-1.06L21.44 12l-4.72-4.72a.75.75 0 0 1 0-1.06Zm-9.44 0a.75.75 0 0 1 0 1.06L2.56 12l4.72 4.72a.75.75 0 0 1-1.06 1.06L.97 12.53a.75.75 0 0 1 0-1.06l5.25-5.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
			</svg>			   
		</button>
	</div>

	<!-- CSS | Cascade Style Sheet -->
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			display: flex;
			justify-content: center;
			align-items: center;

			height: 100vh;
			width: 100vw;
		}

		/* Container */
		div.activity-menu {
			position: relative;

			height: 30px;
			width: 30px;
		}

		/* Buttons */
		button {
			position: absolute;
			top: 0;
			left: 0;

			display: flex;
			justify-content: center;
			align-items: center;

			height: 30px;
			width: 30px;

			border: none;
			border-radius: 50%;
			background-color: #334461;
		}

		button#question-and-answer,
		button#fill-in-the-blank,
		button#multiple-choice,
		button#conversation-ordering,
		button#image-upload,
		button#audio-upload,
		button#video-upload {
			height: 20px;
			width: 20px;
		}

		button.option-btn {
			opacity: 0;
			visibility: hidden;
			pointer-events: none;

			transform: translate(5px, 5px);
			transition: all 0.5s ease;
		}

		.activity-menu.open button.option-btn {
			opacity: 1;
			visibility: visible;
			pointer-events: auto;
		}

		

		div.activity-menu.open .first-btn {
			transform: translate(-25px, 10px);
		}

		div.activity-menu.open .second-btn {
			transform: translate(-20px, -15px);
			transition-delay: 0.1s;
		}

		div.activity-menu.open .third-btn {
			transform: translate(5px, -25px);
			transition-delay: 0.2s;
		}

		div.activity-menu.open .fourth-btn {
			transform: translate(30px, -15px);
			transition-delay: 0.3s;
		}

		div.activity-menu.open .fifth-btn {
			transform: translate(35px, 10px);
			transition-delay: 0.4s;
		}

		div.activity-menu.open .sixth-btn {
			transform: translate(22.5px, 32.5px);
			transition-delay: 0.5s;
		}

		div.activity-menu.open .seventh-btn {
			transform: translate(-7.5px, 32.5px);
			transition-delay: 0.6s;
		}

		button#upload {
			display: flex;
		}

		/* SVG */
		svg.size-4,
		svg.size-5 {
			height: 15px;
			width: 15px;

			fill: #ffffff;
			cursor: pointer;
		}

		svg.size-4 {
			height: 10px;
			width: 10px;
		}
	</style>

	<!-- JS | JavaScript -->
	<script>
		const activityMenu = document.querySelector('.activity-menu');
		const uploadBtn = document.getElementById('upload');
		const questionAndAnswerBtn = document.getElementById('question-and-answer');
		const fillInTheBlankBtn = document.getElementById('fill-in-the-blank');
		const multipleChoiceBtn = document.getElementById('multiple-choice');
		const conversationOrderingBtn = document.getElementById('conversation-ordering');

		uploadBtn.addEventListener('click', () => {
			activityMenu.classList.toggle('open');
		});
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TimeTable</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --navy: #334461;
            --deep: #071630;
            --page: #e8edf2;
            --card: #ffffff;
            --soft: #f7f8fc;
            --line: #d9def5;
            --text: #253044;
            --muted: #667085;
            --blue: #303f9f;
        }

        body {
            margin: 0;
            min-height: 100vh;
            width: 100vw;
            padding: 20px;
            background: var(--page);
            color: var(--text);
            font-family: "Nunito", "Segoe UI", Arial, sans-serif;
        }

        button {
            font: inherit;
        }

        .admin-app {
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 40px);
            width: 100%;
        }

        .admin-sidebar {
            display: flex;
            flex-direction: column;
            width: 175px;
            flex: 0 0 175px;
            border-radius: 20px;
            background: var(--navy);
            color: #ffffff;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .admin-sidebar-scroll {
            flex: 1;
            min-height: 0;
            padding: 20px 14px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .admin-sidebar-scroll::-webkit-scrollbar {
            display: none;
        }

        .admin-avatar {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.72);
            background: linear-gradient(145deg, #f8fbff 0%, #d9e2ff 100%);
            color: var(--blue);
            font-weight: 800;
        }

        .admin-sidebar-title {
            margin: 0;
            font-size: 1rem;
            line-height: 1.1;
        }

        .admin-sidebar-role {
            margin: 4px 0 16px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.75rem;
        }

        .admin-sidebar-section {
            margin-top: 15px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.22);
        }

        .admin-sidebar-section:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .admin-sidebar-heading {
            margin: 0 0 10px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.75rem;
            font-weight: 700;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .admin-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            width: 100%;
            min-height: 38px;
            padding: 9px 10px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            cursor: pointer;
            text-align: left;
        }

        .admin-nav-btn:hover,
        .admin-nav-btn.is-active {
            background: rgba(255, 255, 255, 0.18);
        }

        .admin-nav-icon {
            width: 15px;
            height: 15px;
            flex: 0 0 15px;
        }

        .admin-nav-label {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
        }

        .admin-logoff-wrap {
            padding: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.22);
        }

        .admin-logoff-btn {
            justify-content: center;
            background: transparent;
        }

        .admin-main {
            flex: 1;
            min-width: 0;
            min-height: calc(100vh - 40px);
            padding: 20px;
            border-radius: 20px;
            background: var(--card);
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.18);
            overflow: auto;
        }

        .admin-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .admin-panel-title {
            margin: 0 0 8px;
            color: var(--blue);
            font-size: 1.35rem;
            line-height: 1.1;
        }

        .admin-panel-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .admin-refresh-btn {
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--soft);
            color: var(--navy);
            font-weight: 800;
            cursor: pointer;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .admin-stat-card,
        .admin-dashboard-category,
        .admin-placeholder {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--soft);
        }

        .admin-stat-card {
            padding: 14px;
        }

        .admin-stat-value {
            display: block;
            color: var(--blue);
            font-size: 1.45rem;
            font-weight: 900;
        }

        .admin-stat-label {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .admin-dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            align-items: start;
        }

        .admin-dashboard-category {
            min-width: 0;
            padding: 12px 14px 14px;
        }

        .admin-dashboard-category.is-hidden {
            display: none;
        }

        .admin-dashboard-category-title {
            margin: 0 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #c5cae9;
            color: var(--navy);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .admin-dashboard-category-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-dashboard-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border: 1px solid #e8eaf6;
            border-radius: 12px;
            background: #ffffff;
            color: #333333;
            font-size: 0.8rem;
        }

        .admin-dashboard-item-title {
            color: var(--blue);
            font-weight: 800;
        }

        .admin-dashboard-item-meta {
            color: #555555;
            line-height: 1.35;
        }

        .admin-dashboard-empty {
            margin: 0;
            color: #757575;
            font-size: 0.82rem;
            font-style: italic;
        }

        .admin-placeholder {
            padding: 28px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }

            .admin-app {
                flex-direction: column;
                min-height: calc(100vh - 24px);
            }

            .admin-sidebar {
                width: 100%;
                flex-basis: auto;
            }

            .admin-main {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="admin-app">
        <aside class="admin-sidebar" aria-label="Admin navigation">
            <div class="admin-sidebar-scroll">
                <div>
                    <div class="admin-avatar" aria-hidden="true">A</div>
                    <h1 class="admin-sidebar-title">Admin</h1>
                    <p class="admin-sidebar-role">Full platform access</p>
                </div>

                <section class="admin-sidebar-section">
                    <div class="admin-nav">
                        <button type="button" class="admin-nav-btn is-active" data-view="dashboard">
                            <svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 3a3 3 0 0 0-3 3v2.25a3 3 0 0 0 3 3h2.25a3 3 0 0 0 3-3V6a3 3 0 0 0-3-3H6ZM15.75 3a3 3 0 0 0-3 3v2.25a3 3 0 0 0 3 3H18a3 3 0 0 0 3-3V6a3 3 0 0 0-3-3h-2.25ZM6 12.75a3 3 0 0 0-3 3V18a3 3 0 0 0 3 3h2.25a3 3 0 0 0 3-3v-2.25a3 3 0 0 0-3-3H6ZM17.625 13.5a.75.75 0 0 0-1.5 0v2.625H13.5a.75.75 0 0 0 0 1.5h2.625v2.625a.75.75 0 0 0 1.5 0v-2.625h2.625a.75.75 0 0 0 0-1.5h-2.625V13.5Z" /></svg>
                            <span class="admin-nav-label">Dashboard</span>
                        </button>
                    </div>
                </section>

                <section class="admin-sidebar-section">
                    <h2 class="admin-sidebar-heading">- Management</h2>
                    <div class="admin-nav">
                        <button type="button" class="admin-nav-btn" data-view="teachers"><svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M8.25 6.75a3.75 3.75 0 1 1 7.5 0 3.75 3.75 0 0 1-7.5 0ZM15.75 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM2.25 9.75a3 3 0 1 1 6 0 3 3 0 0 1-6 0ZM6.31 15.117A6.745 6.745 0 0 1 12 12a6.745 6.745 0 0 1 6.709 7.498.75.75 0 0 1-.372.568A12.696 12.696 0 0 1 12 21.75c-2.305 0-4.47-.612-6.337-1.684a.75.75 0 0 1-.372-.568 6.787 6.787 0 0 1 1.019-4.38Z" clip-rule="evenodd" /></svg><span class="admin-nav-label">Teachers</span></button>
                        <button type="button" class="admin-nav-btn" data-view="schools"><svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M3 2.25a.75.75 0 0 0 0 1.5v16.5h-.75a.75.75 0 0 0 0 1.5H15v-18a.75.75 0 0 0 0-1.5H3ZM16.5 6.75v15h5.25a.75.75 0 0 0 0-1.5H21v-12a.75.75 0 0 0 0-1.5h-4.5Z" clip-rule="evenodd" /></svg><span class="admin-nav-label">Schools</span></button>
                        <button type="button" class="admin-nav-btn" data-view="students"><svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" /></svg><span class="admin-nav-label">Students</span></button>
                        <button type="button" class="admin-nav-btn" data-view="classes"><svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Z" clip-rule="evenodd" /></svg><span class="admin-nav-label">Classes</span></button>
                        <button type="button" class="admin-nav-btn" data-view="payments"><svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 7.5a2.25 2.25 0 1 0 0 4.5 2.25 2.25 0 0 0 0-4.5Z" /><path fill-rule="evenodd" d="M1.5 4.875C1.5 3.839 2.34 3 3.375 3h17.25c1.035 0 1.875.84 1.875 1.875v9.75c0 1.036-.84 1.875-1.875 1.875H3.375A1.875 1.875 0 0 1 1.5 14.625v-9.75Z" clip-rule="evenodd" /></svg><span class="admin-nav-label">Payments</span></button>
                    </div>
                </section>

                <section class="admin-sidebar-section">
                    <h2 class="admin-sidebar-heading">- Other</h2>
                    <div class="admin-nav">
                        <button type="button" class="admin-nav-btn" data-view="report"><span class="admin-nav-label">Report</span></button>
                        <button type="button" class="admin-nav-btn" data-view="settings"><span class="admin-nav-label">Settings</span></button>
                        <button type="button" class="admin-nav-btn" data-view="audit-logs"><span class="admin-nav-label">Audit Logs</span></button>
                    </div>
                </section>
            </div>

            <div class="admin-logoff-wrap">
                <button type="button" class="admin-nav-btn admin-logoff-btn" id="adminLogoffBtn">
                    <svg class="admin-nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.5 3.75A1.5 1.5 0 0 0 6 5.25v13.5a1.5 1.5 0 0 0 1.5 1.5h6a1.5 1.5 0 0 0 1.5-1.5v-2.25a.75.75 0 0 1 1.5 0v2.25a3 3 0 0 1-3 3h-6a3 3 0 0 1-3-3V5.25a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3V7.5a.75.75 0 0 1-1.5 0V5.25a1.5 1.5 0 0 0-1.5-1.5h-6Zm10.72 4.72a.75.75 0 0 1 1.06 0l3 3a.75.75 0 0 1 0 1.06l-3 3a.75.75 0 1 1-1.06-1.06l1.72-1.72H9.75a.75.75 0 0 1 0-1.5h10.19l-1.72-1.72a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" /></svg>
                    <span class="admin-nav-label">Log off</span>
                </button>
            </div>
        </aside>

        <main class="admin-main" id="adminMain" aria-live="polite"></main>
    </div>

    <script>
        const ROSTER_STORAGE_KEY = 'timetable_roster';
        const ADMIN_LOGIN_SESSION_KEY = 'timetable_admin_login_complete';
        const LOGIN_SESSION_SUPPRESS_KEY = 'timetable_teacher_session_suppressed';
        const ADMIN_ACCOUNT_STORAGE_KEY = 'timetable_admin_account';
        const DEFAULT_ADMIN_USERNAME = 'admin_';

        let currentView = 'dashboard';
        let currentRoster = getEmptyRoster();

        function getEmptyRoster() {
            return {
                teachers: [],
                private: [],
                speakon: [],
                passport: [],
                studentSchools: {},
                teacherEmails: {},
                teacherPasswords: {},
                customSchools: [],
                studentTeachers: {},
                studentEmails: {},
                studentUsernames: {},
                studentPasswords: {},
                studentCities: {},
                studentCountries: {}
            };
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function asArray(value) {
            return Array.isArray(value) ? value.map((item) => String(item || '').trim()).filter(Boolean) : [];
        }

        function asObject(value) {
            return value && typeof value === 'object' && !Array.isArray(value) ? value : {};
        }

        function loadRoster() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ROSTER_STORAGE_KEY) || 'null');
                if (!parsed || typeof parsed !== 'object') return getEmptyRoster();
                return {
                    ...getEmptyRoster(),
                    teachers: asArray(parsed.teachers),
                    private: asArray(parsed.private),
                    speakon: asArray(parsed.speakon),
                    passport: asArray(parsed.passport),
                    studentSchools: asObject(parsed.studentSchools),
                    teacherEmails: asObject(parsed.teacherEmails),
                    teacherPasswords: asObject(parsed.teacherPasswords),
                    customSchools: asArray(parsed.customSchools),
                    studentTeachers: asObject(parsed.studentTeachers),
                    studentEmails: asObject(parsed.studentEmails),
                    studentUsernames: asObject(parsed.studentUsernames),
                    studentPasswords: asObject(parsed.studentPasswords),
                    studentCities: asObject(parsed.studentCities),
                    studentCountries: asObject(parsed.studentCountries)
                };
            } catch {
                return getEmptyRoster();
            }
        }

        function loadAdminName() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ADMIN_ACCOUNT_STORAGE_KEY) || 'null');
                return String(parsed?.username || DEFAULT_ADMIN_USERNAME).trim() || DEFAULT_ADMIN_USERNAME;
            } catch {
                return DEFAULT_ADMIN_USERNAME;
            }
        }

        function getAllStudents() {
            return [
                ...currentRoster.private.map((name) => ({ name, kind: 'private' })),
                ...currentRoster.speakon.map((name) => ({ name, kind: 'speakon' })),
                ...currentRoster.passport.map((name) => ({ name, kind: 'passport' }))
            ].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
        }

        function getStudentSchoolName(student) {
            const saved = String(currentRoster.studentSchools[student.name] || '').trim();
            if (saved) return saved;
            if (student.kind === 'speakon') return 'SpeakOn';
            if (student.kind === 'passport') return 'Passport';
            return 'HomeTeachers';
        }

        function getSchoolSummaries() {
            const schools = new Map();
            getAllStudents().forEach((student) => {
                const title = getStudentSchoolName(student);
                const key = title.toLowerCase();
                if (!schools.has(key)) schools.set(key, { title, students: [] });
                schools.get(key).students.push(student.name);
            });
            currentRoster.customSchools.forEach((title) => {
                const key = title.toLowerCase();
                if (!schools.has(key)) schools.set(key, { title, students: [] });
            });
            return [...schools.values()].sort((a, b) => a.title.localeCompare(b.title, undefined, { sensitivity: 'base' }));
        }

        function passwordLabel(value) {
            return String(value || '').trim() ? 'Configured' : 'Not set';
        }

        function renderStats() {
            const stats = [
                ['Teachers', currentRoster.teachers.length],
                ['Schools', getSchoolSummaries().length],
                ['Students', getAllStudents().length]
            ];
            return `<div class="admin-stats">${stats.map(([label, value]) => `
                <div class="admin-stat-card">
                    <span class="admin-stat-value">${value}</span>
                    <span class="admin-stat-label">${label}</span>
                </div>
            `).join('')}</div>`;
        }

        function renderTeacherRows() {
            if (!currentRoster.teachers.length) return '<p class="admin-dashboard-empty">No teacher profiles yet.</p>';
            return currentRoster.teachers
                .slice()
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }))
                .map((name) => {
                    const email = String(currentRoster.teacherEmails[name] || '').trim();
                    return `<div class="admin-dashboard-item">
                        <span class="admin-dashboard-item-title">${escapeHtml(name)}</span>
                        <span class="admin-dashboard-item-meta">Email: ${email ? escapeHtml(email) : '<em>Not set</em>'}</span>
                        <span class="admin-dashboard-item-meta">Password: ${escapeHtml(passwordLabel(currentRoster.teacherPasswords[name]))}</span>
                    </div>`;
                }).join('');
        }

        function renderSchoolRows() {
            const schools = getSchoolSummaries();
            if (!schools.length) return '<p class="admin-dashboard-empty">No schools yet.</p>';
            return schools.map(({ title, students }) => {
                const studentList = students.length ? students.map(escapeHtml).join(', ') : '<em>No students linked</em>';
                return `<div class="admin-dashboard-item">
                    <span class="admin-dashboard-item-title">${escapeHtml(title)}</span>
                    <span class="admin-dashboard-item-meta">Students (${students.length}): ${studentList}</span>
                </div>`;
            }).join('');
        }

        function renderStudentRows() {
            const students = getAllStudents();
            if (!students.length) return '<p class="admin-dashboard-empty">No students yet.</p>';
            return students.map((student) => {
                const name = student.name;
                const email = String(currentRoster.studentEmails[name] || '').trim();
                const username = String(currentRoster.studentUsernames[name] || '').trim();
                const teacher = String(currentRoster.studentTeachers[name] || '').trim();
                const city = String(currentRoster.studentCities[name] || '').trim();
                const country = String(currentRoster.studentCountries[name] || '').trim();
                const location = [city, country].filter(Boolean).join(', ');
                return `<div class="admin-dashboard-item">
                    <span class="admin-dashboard-item-title">${escapeHtml(name)}</span>
                    <span class="admin-dashboard-item-meta">School: ${escapeHtml(getStudentSchoolName(student))}</span>
                    <span class="admin-dashboard-item-meta">Roster: ${escapeHtml(student.kind)}</span>
                    <span class="admin-dashboard-item-meta">Email: ${email ? escapeHtml(email) : '<em>Not set</em>'}</span>
                    <span class="admin-dashboard-item-meta">Username: ${username ? escapeHtml(username) : '<em>Not set</em>'}</span>
                    <span class="admin-dashboard-item-meta">Password: ${escapeHtml(passwordLabel(currentRoster.studentPasswords[name]))}</span>
                    <span class="admin-dashboard-item-meta">Assigned teacher: ${teacher ? escapeHtml(teacher) : '<em>None</em>'}</span>
                    ${location ? `<span class="admin-dashboard-item-meta">Location: ${escapeHtml(location)}</span>` : ''}
                </div>`;
            }).join('');
        }

        function sectionClass(sectionView) {
            return currentView === 'dashboard' || currentView === sectionView ? '' : ' is-hidden';
        }

        function titleForView(view) {
            return view[0].toUpperCase() + view.slice(1).replaceAll('-', ' ');
        }

        function renderDashboard() {
            const adminName = loadAdminName();
            document.getElementById('adminMain').innerHTML = `
                <div class="admin-panel-header">
                    <div>
                        <h2 class="admin-panel-title">${escapeHtml(titleForView(currentView))}</h2>
                        <p class="admin-panel-subtitle">Logged in as ${escapeHtml(adminName)}. Overview of teachers, schools, and students in your roster.</p>
                    </div>
                    <button type="button" class="admin-refresh-btn" id="adminRefreshBtn">Refresh</button>
                </div>
                ${renderStats()}
                <div class="admin-dashboard-grid">
                    <section class="admin-dashboard-category${sectionClass('teachers')}">
                        <h3 class="admin-dashboard-category-title">Teachers</h3>
                        <div class="admin-dashboard-category-body">${renderTeacherRows()}</div>
                    </section>
                    <section class="admin-dashboard-category${sectionClass('schools')}">
                        <h3 class="admin-dashboard-category-title">Schools</h3>
                        <div class="admin-dashboard-category-body">${renderSchoolRows()}</div>
                    </section>
                    <section class="admin-dashboard-category${sectionClass('students')}">
                        <h3 class="admin-dashboard-category-title">Students</h3>
                        <div class="admin-dashboard-category-body">${renderStudentRows()}</div>
                    </section>
                </div>
            `;
            document.getElementById('adminRefreshBtn')?.addEventListener('click', () => {
                currentRoster = loadRoster();
                renderDashboard();
            });
        }

        function renderPlaceholder(view) {
            document.getElementById('adminMain').innerHTML = `
                <div class="admin-panel-header">
                    <div>
                        <h2 class="admin-panel-title">${escapeHtml(titleForView(view))}</h2>
                        <p class="admin-panel-subtitle">This standalone admin page renders roster overview data directly from localStorage.</p>
                    </div>
                </div>
                <div class="admin-placeholder">Use Dashboard, Teachers, Schools, or Students to view registered records.</div>
            `;
        }

        function setActiveView(view) {
            currentView = view;
            document.querySelectorAll('[data-view]').forEach((btn) => {
                btn.classList.toggle('is-active', btn.getAttribute('data-view') === view);
            });
            if (['dashboard', 'teachers', 'schools', 'students'].includes(view)) {
                renderDashboard();
            } else {
                renderPlaceholder(view);
            }
        }

        function assertAdminSession() {
            try {
                if (sessionStorage.getItem(ADMIN_LOGIN_SESSION_KEY) === 'true') return true;
            } catch {
                return false;
            }
            window.location.href = 'test.html';
            return false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!assertAdminSession()) return;
            currentRoster = loadRoster();
            setActiveView('dashboard');

            document.querySelectorAll('[data-view]').forEach((btn) => {
                btn.addEventListener('click', () => setActiveView(btn.getAttribute('data-view') || 'dashboard'));
            });

            document.getElementById('adminLogoffBtn')?.addEventListener('click', () => {
                try {
                    sessionStorage.removeItem(ADMIN_LOGIN_SESSION_KEY);
                    sessionStorage.setItem(LOGIN_SESSION_SUPPRESS_KEY, '1');
                } catch {
                    /* ignore */
                }
                window.location.href = 'test.html';
            });
        });
    </script>
</body>
</html>

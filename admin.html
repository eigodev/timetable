<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TimeTable</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --navy: #334461;
            --deep: #071630;
            --page: #e8edf2;
            --card: #ffffff;
            --soft: #f7f8fc;
            --line: #d9def5;
            --text: #253044;
            --muted: #667085;
            --blue: #303f9f;
        }

        body.admin-page {
            display: block;
            justify-content: flex-start;
            align-items: stretch;
            height: auto;
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background: var(--page);
            color: var(--text);
            font-family: "Nunito", "Segoe UI", Arial, sans-serif;
        }

        button {
            font: inherit;
        }

        svg {
            height: 20px;
        }

        .admin-app {
            display: flex;
            gap: 20px;
            align-items: stretch;
            width: 100%;
            min-height: calc(100vh - 40px);
        }

        .admin-app > .sidebar {
            flex-shrink: 0;
            align-self: stretch;
            height: auto;
            min-height: calc(100vh - 40px);
        }

        .admin-main {
            flex: 1;
            min-width: 0;
            min-height: calc(100vh - 40px);
            padding: 20px;
            border-radius: 20px;
            background: var(--card);
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.18);
            overflow: auto;
        }

        .admin-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .admin-panel-title {
            margin: 0 0 8px;
            color: var(--blue);
            font-size: 1.35rem;
            line-height: 1.1;
        }

        .admin-panel-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .admin-stat-card,
        .admin-dashboard-category,
        .admin-placeholder {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--soft);
        }

        .admin-stat-card {
            display: flex;
            padding: 15px;
            align-items: center;
            gap: 10px;
        }

        .admin-stat-value {
            display: block;
            color: var(--blue);
            font-size: 1.45rem;
            font-weight: 900;
        }

        .admin-stat-label {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .admin-dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: stretch;
        }

        .admin-dashboard-divider.is-hidden {
            display: none;
        }

        .admin-dashboard-category-body--two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            align-items: start;
        }

        .admin-dashboard-subcol {
            width: stretch;
        }

        .admin-dashboard-subcol-title {
            margin: 0 0 8px;
            font-size: 0.82rem;
            font-weight: 800;
            color: var(--navy);
        }

        .admin-dashboard-subcol.is-hidden {
            display: none;
        }

        .admin-school-student-list {
            margin: 6px 0 0;
            padding-left: 1.15rem;
            color: #555555;
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .admin-school-student-list li {
            margin: 2px 0;
        }

        .admin-dashboard-category {
            min-width: 0;
            padding: 12px 14px 14px;
        }

        .admin-dashboard-category.is-hidden {
            display: none;
        }

        .admin-dashboard-category-title {
            margin: 0 0 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #c5cae9;
            color: var(--navy);
            font-size: 0.95rem;
            font-weight: 800;
        }

        .admin-dashboard-category-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-dashboard-item {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px 44px 10px 10px;
            border: 1px solid #e8eaf6;
            border-radius: 12px;
            background: #ffffff;
            color: #333333;
            font-size: 0.8rem;
        }

        .admin-dashboard-item-title {
            color: var(--blue);
            font-weight: 800;
        }

        .admin-dashboard-item-meta {
            color: #555555;
            line-height: 1.35;
        }

        .admin-dashboard-item-meta--missing,
        .admin-dashboard-item-meta--missing .admin-dashboard-username-value {
            color: #c62828;
            font-weight: 500;
        }

        .admin-dashboard-item-meta--missing .admin-username-unset {
            color: #c62828;
            font-style: italic;
            font-weight: 500;
        }

        .admin-dashboard-item-meta--missing em {
            color: inherit;
            font-style: italic;
            font-weight: 500;
        }

        .admin-dashboard-empty {
            margin: 0;
            color: #757575;
            font-size: 0.82rem;
            font-style: italic;
        }

        .admin-dashboard-item-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 2px;
            color: #c62828;
            border-radius: 6px;
        }

        .admin-dashboard-item-remove:hover {
            background: #ffebee;
        }

        .admin-dashboard-button-remove {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-dashboard-button-remove svg {
            width: 20px;
            height: 20px;
        }

        /* Roster delete confirmation (replaces window.confirm) */
        .admin-roster-delete-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10050;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .admin-roster-delete-modal.is-open {
            display: flex;
        }

        .admin-roster-delete-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
        }

        .admin-roster-delete-dialog {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 22px 22px 18px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 2.5px 2.5px 5px 0px rgba(30, 40, 55, 0.75);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-roster-delete-title {
            margin: 0 0 2px;
            font-size: 1.2rem;
            color: #b71c1c;
        }

        .admin-roster-delete-body {
            margin: 0;
            font-size: 0.95rem;
            color: #37474f;
            line-height: 1.4;
        }

        .admin-roster-delete-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 6px;
        }

        .admin-roster-delete-btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .admin-roster-delete-btn--cancel {
            background: #eceff1;
            color: #37474f;
        }

        .admin-roster-delete-btn--cancel:hover {
            background: #dfe3e6;
        }

        .admin-roster-delete-btn--confirm {
            background: linear-gradient(135deg, #334461, #071630);
            color: #ffffff;
        }

        .admin-roster-delete-btn--confirm:hover {
            filter: brightness(1.06);
        }

        .admin-placeholder {
            padding: 28px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 760px) {
            body.admin-page {
                padding: 12px;
            }

            .admin-app {
                flex-direction: column;
                min-height: calc(100vh - 24px);
            }

            .admin-app > .sidebar {
                width: 100% !important;
                min-height: 0;
            }

            .admin-main {
                min-height: auto;
            }
        }
    </style>
</head>

    <script>
        /* Moved from login-screen.html (formerly test.html) lines 455-694; kept isolated so admin.html has no duplicate globals. */
        (function movedAdminLoginHelpers() {
            const ADMIN_LOGIN_SESSION_KEY = 'timetable_admin_login_complete';
            const ADMIN_ACCOUNT_STORAGE_KEY = 'timetable_admin_account';
            const LOGIN_CREDENTIALS_STORAGE_KEY = 'timetable_saved_login_credentials';
            const LOGIN_SESSION_SUPPRESS_KEY = 'timetable_teacher_session_suppressed';
            const ROSTER_STORAGE_KEY = 'timetable_roster';
            const API_BEARER_TOKEN_STORAGE_KEY = 'timetable_api_bearer_token';
            const DEFAULT_ADMIN_USERNAME = '@Admin';
            const DEFAULT_ADMIN_PASSWORD = 'admin';
            const PASSWORD_HASH_PREFIX = 'sha256$';

            const usernameInput = document.getElementById('loginUsername');
            const passwordInput = document.getElementById('loginPassword');
            const loginBtn = document.querySelector('.login-btn');

            async function hashPassword(password) {
                const hasCrypto = window.crypto && window.crypto.subtle && typeof TextEncoder !== 'undefined';
                if (!hasCrypto) return String(password || '');
                const encoded = new TextEncoder().encode(String(password || ''));
                const digestBuffer = await window.crypto.subtle.digest('SHA-256', encoded);
                const digestBytes = Array.from(new Uint8Array(digestBuffer));
                const digestHex = digestBytes.map((byte) => byte.toString(16).padStart(2, '0')).join('');
                return `${PASSWORD_HASH_PREFIX}${digestHex}`;
            }

            function normalizeAdminAccount(account) {
                if (!account || typeof account !== 'object' || Array.isArray(account)) return null;
                const username = String(account.username || '').trim();
                const passwordHash = String(account.passwordHash || '').trim();
                if (!username || !passwordHash) return null;
                return { username, passwordHash };
            }

            function loadStoredAdminAccount() {
                try {
                    return normalizeAdminAccount(JSON.parse(localStorage.getItem(ADMIN_ACCOUNT_STORAGE_KEY) || 'null'));
                } catch {
                    return null;
                }
            }

            function loadCachedRosterAdminAccount() {
                try {
                    const roster = JSON.parse(localStorage.getItem(ROSTER_STORAGE_KEY) || 'null');
                    return normalizeAdminAccount(roster?.adminAccount);
                } catch {
                    return null;
                }
            }

            function normalizeRoster(roster) {
                return roster && typeof roster === 'object' && !Array.isArray(roster) ? roster : null;
            }

            function clearTimetablePageApiBearerTokenStores() {
                try {
                    sessionStorage.removeItem(API_BEARER_TOKEN_STORAGE_KEY);
                } catch (e) {
                    /* ignore */
                }
                try {
                    localStorage.removeItem(API_BEARER_TOKEN_STORAGE_KEY);
                } catch (e) {
                    /* ignore */
                }
            }

            function persistTimetablePageApiBearerToken(token) {
                const t = String(token || '').trim();
                if (!t) return;
                try {
                    sessionStorage.setItem(API_BEARER_TOKEN_STORAGE_KEY, t);
                } catch (e) {
                    /* ignore */
                }
                try {
                    localStorage.setItem(API_BEARER_TOKEN_STORAGE_KEY, t);
                } catch (e) {
                    /* ignore */
                }
            }

            function timetablePageApiAuthHeaders() {
                try {
                    let t = localStorage.getItem(API_BEARER_TOKEN_STORAGE_KEY);
                    if (!t || !String(t).trim()) {
                        t = sessionStorage.getItem(API_BEARER_TOKEN_STORAGE_KEY);
                    }
                    if (t && String(t).trim()) return { Authorization: `Bearer ${String(t).trim()}` };
                } catch (e) {
                    /* ignore */
                }
                return {};
            }

            async function refreshTimetablePageApiBearerToken(usernameTyped, passwordTyped) {
                try {
                    const res = await fetch('/api/auth-login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: String(usernameTyped || '').trim(),
                            password: String(passwordTyped || '')
                                .replace(/\u200b|\uFEFF|\u2060/g, '')
                                .trim()
                        })
                    });
                    const data = await res.json().catch(() => null);
                    if (res.status === 503) {
                        clearTimetablePageApiBearerTokenStores();
                        try {
                            sessionStorage.setItem('timetable_api_auth_unconfigured', '1');
                        } catch (eUn) {
                            /* ignore */
                        }
                        return;
                    }
                    if (!res.ok || !data?.token) {
                        clearTimetablePageApiBearerTokenStores();
                        try {
                            sessionStorage.removeItem('timetable_api_auth_unconfigured');
                        } catch (eRm) {
                            /* ignore */
                        }
                        return;
                    }
                    try {
                        sessionStorage.removeItem('timetable_api_auth_unconfigured');
                    } catch (eOk) {
                        /* ignore */
                    }
                    persistTimetablePageApiBearerToken(data.token);
                    return {
                        ok: true,
                        status: res.status,
                        role: String(data?.role || '').trim(),
                        profile: String(data?.profile || '').trim(),
                        resolvedUsername: String(data?.resolvedUsername || '').trim()
                    };
                } catch (e) {
                    console.warn('auth-login:', e);
                    return { ok: false, status: 0 };
                }
            }

            function loadCachedRoster() {
                try {
                    return normalizeRoster(JSON.parse(localStorage.getItem(ROSTER_STORAGE_KEY) || 'null'));
                } catch {
                    return null;
                }
            }

            async function loadHostedRoster() {
                try {
                    const response = await fetch('/api/roster?t=' + Date.now(), {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json', ...timetablePageApiAuthHeaders() },
                        cache: 'no-cache'
                    });
                    if (!response.ok) return null;
                    const data = await response.json();
                    const roster = normalizeRoster(data?.roster);
                    if (!roster) return null;
                    if (window.TimeTableAuthMigrate?.migrateRosterAuthFields(roster)) {
                        /* roster mutated; persisted below */
                    }
                    try {
                        localStorage.setItem(ROSTER_STORAGE_KEY, JSON.stringify(roster));
                    } catch (e) {
                        console.error(e);
                    }
                    const account = normalizeAdminAccount(roster.adminAccount);
                    if (account) {
                        localStorage.setItem(ADMIN_ACCOUNT_STORAGE_KEY, JSON.stringify(account));
                    }
                    return roster;
                } catch {
                    return null;
                }
            }

            function getRosterCreatedAccounts(roster) {
                if (!roster || typeof roster !== 'object') return [];
                const accounts = [];
                const teacherLogins = roster.teacherEmails && typeof roster.teacherEmails === 'object' ? roster.teacherEmails : {};
                const teacherPasswords = roster.teacherPasswords && typeof roster.teacherPasswords === 'object' ? roster.teacherPasswords : {};
                const teachers = Array.isArray(roster.teachers) ? roster.teachers : [];
                teachers.forEach((name) => {
                    const username = String(teacherLogins[name] || '').trim();
                    const passwordHash = String(teacherPasswords[name] || '').trim();
                    if (username && passwordHash) {
                        accounts.push({ role: 'teacher', profileName: String(name || '').trim(), username, passwordHash });
                    }
                });

                const studentUsernames = roster.studentUsernames && typeof roster.studentUsernames === 'object' ? roster.studentUsernames : {};
                const studentPasswords = roster.studentPasswords && typeof roster.studentPasswords === 'object' ? roster.studentPasswords : {};
                [
                    ...(Array.isArray(roster.private) ? roster.private : []),
                    ...(Array.isArray(roster.speakon) ? roster.speakon : []),
                    ...(Array.isArray(roster.passport) ? roster.passport : [])
                ].forEach((name) => {
                    const passwordHash = String(studentPasswords[name] || '').trim();
                    if (!passwordHash) return;
                    const username = String(studentUsernames[name] || '').trim();
                    if (username) {
                        accounts.push({ role: 'student', profileName: String(name || '').trim(), username, passwordHash });
                    }
                });

                const gateStaff = Array.isArray(roster.gateStaffAccounts) ? roster.gateStaffAccounts : [];
                gateStaff.forEach((entry) => {
                    const username = String(entry.username || '').trim();
                    const passwordHash = String(entry.password || '').trim();
                    const profileName = String(entry.profileName || '').trim();
                    const appRole = String(entry.appRole || '').trim();
                    if (!username || !passwordHash || !profileName || !appRole) return;
                    accounts.push({
                        role: 'teacher',
                        profileName,
                        username,
                        passwordHash,
                        appRole
                    });
                });

                return accounts;
            }

            function normalizeStudentLoginUsernameKey(value) {
                const raw = String(value || '');
                let s = raw;
                try {
                    s = raw.normalize('NFKD');
                } catch (e1) {
                    s = raw;
                }
                try {
                    s = s.replace(/\p{M}+/gu, '');
                } catch (e2) {
                    s = s.replace(/[\u0300-\u036f]/g, '');
                }
                s = s.toLowerCase();
                let out = '';
                for (const ch of s) {
                    if (/^[0-9a-z]$/.test(ch)) {
                        out += ch;
                        continue;
                    }
                    let t = ch;
                    try {
                        t = ch.normalize('NFKD').replace(/\p{M}+/gu, '');
                    } catch (e3) {
                        try {
                            t = ch.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
                        } catch (e4) {
                            t = '';
                        }
                    }
                    t = String(t).toLowerCase();
                    for (const c of t) {
                        if (/^[0-9a-z]$/.test(c)) out += c;
                    }
                }
                return out;
            }

            function studentGateLoginAccountMatches(typedRaw, accountUsernameRaw) {
                const typed = String(typedRaw || '').trim();
                const acc = String(accountUsernameRaw || '').trim();
                if (!typed || !acc) return false;
                if (typed.toLowerCase() === acc.toLowerCase()) return true;
                const a = normalizeStudentLoginUsernameKey(acc);
                const b = normalizeStudentLoginUsernameKey(typed);
                return !!a && a === b;
            }

            function sanitizeLoginPasswordTyped(raw) {
                return String(raw || '')
                    .replace(/\u200b|\uFEFF|\u2060/g, '')
                    .trim();
            }

            async function verifyPassword(storedPasswordRaw, passwordRaw) {
                const storedPassword = String(storedPasswordRaw || '').trim();
                const typedPassword = sanitizeLoginPasswordTyped(passwordRaw);
                if (!storedPassword || !typedPassword) return false;
                if (!storedPassword.startsWith(PASSWORD_HASH_PREFIX)) {
                    const plateRx = /^@[a-z]{3}\d[a-z]\d{2}$/i;
                    if (plateRx.test(storedPassword) && plateRx.test(typedPassword)) {
                        return storedPassword.toLowerCase() === typedPassword.toLowerCase();
                    }
                    return typedPassword === storedPassword;
                }
                return await hashPassword(typedPassword) === storedPassword;
            }

            async function verifyLogin(usernameRaw, passwordRaw) {
                const usernameTyped = String(usernameRaw || '').trim();
                const password = sanitizeLoginPasswordTyped(passwordRaw);
                if (!usernameTyped || !password) return { ok: false };

                if (usernameTyped.toLowerCase() === DEFAULT_ADMIN_USERNAME.toLowerCase() && password === DEFAULT_ADMIN_PASSWORD) {
                    await refreshTimetablePageApiBearerToken(usernameTyped, password);
                    let roster = await loadHostedRoster();
                    if (!roster) roster = loadCachedRoster();
                    if (roster && window.TimeTableAuthMigrate?.migrateRosterAuthFields(roster)) {
                        try {
                            localStorage.setItem(ROSTER_STORAGE_KEY, JSON.stringify(roster));
                        } catch (e) {
                            console.error(e);
                        }
                    }
                    /* Builtin admin must work without /api/auth-login (local dev, no secret, or KV not seeded). */
                    return { ok: true, role: 'admin', resolvedUsername: DEFAULT_ADMIN_USERNAME };
                }

                const authResult = await refreshTimetablePageApiBearerToken(usernameTyped, password);

                let roster = await loadHostedRoster();
                if (!roster) roster = loadCachedRoster();
                if (roster && window.TimeTableAuthMigrate?.migrateRosterAuthFields(roster)) {
                    try {
                        localStorage.setItem(ROSTER_STORAGE_KEY, JSON.stringify(roster));
                    } catch (e) {
                        console.error(e);
                    }
                }

                if (authResult && authResult.ok && authResult.role) {
                    return {
                        ok: true,
                        role: authResult.role,
                        profileName: authResult.profile || '',
                        resolvedUsername: authResult.resolvedUsername || usernameTyped
                    };
                }

                if (authResult && !authResult.ok && authResult.status === 401) {
                    return { ok: false };
                }

                const usernameEff = roster && window.TimeTableAuthMigrate
                    ? TimeTableAuthMigrate.resolveAuthLoginTypedFromRoster(roster, usernameTyped)
                    : usernameTyped;

                const storedAccount =
                    normalizeAdminAccount(roster?.adminAccount)
                    || loadCachedRosterAdminAccount()
                    || loadStoredAdminAccount();

                if (storedAccount) {
                    if (usernameEff.toLowerCase() === storedAccount.username.toLowerCase()) {
                        const okPw = await verifyPassword(storedAccount.passwordHash, password);
                        return okPw
                            ? { ok: true, role: 'admin', resolvedUsername: storedAccount.username }
                            : { ok: false };
                    }
                }

                const createdAccounts = getRosterCreatedAccounts(roster);
                const matchingCreatedAccount = createdAccounts.find((account) => {
                    return studentGateLoginAccountMatches(usernameEff, account.username);
                });
                if (matchingCreatedAccount) {
                    const okPw = await verifyPassword(matchingCreatedAccount.passwordHash, password);
                    return okPw
                        ? {
                              ok: true,
                              role: matchingCreatedAccount.role,
                              profileName: matchingCreatedAccount.profileName,
                              resolvedUsername: matchingCreatedAccount.username
                          }
                        : { ok: false };
                }
                if (storedAccount || createdAccounts.length > 0) return { ok: false };

                return { ok: false };
            }

            window.TimeTableAdminLogin = { verifyLogin };

            if (!loginBtn || !usernameInput || !passwordInput) return;
            loginBtn.addEventListener('click', async function(event) {
                event.preventDefault();
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                if (!username) {
                    alert('Please enter your username.');
                    usernameInput.focus();
                    return;
                }
                if (!password) {
                    alert('Please enter your password.');
                    passwordInput.focus();
                    return;
                }
                const loginResult = await verifyLogin(username, password);
                if (loginResult.ok && loginResult.role === 'admin') {
                    sessionStorage.setItem(ADMIN_LOGIN_SESSION_KEY, 'true');
                    sessionStorage.removeItem(LOGIN_SESSION_SUPPRESS_KEY);
                    window.location.href = 'admin.html';
                } else if (loginResult.ok) {
                    const u = loginResult.resolvedUsername || username;
                    localStorage.setItem(LOGIN_CREDENTIALS_STORAGE_KEY, JSON.stringify({ username: u, password }));
                    sessionStorage.removeItem(ADMIN_LOGIN_SESSION_KEY);
                    sessionStorage.removeItem(LOGIN_SESSION_SUPPRESS_KEY);
                    window.location.href = 'index.html';
                } else {
                    alert('User not found. Please check your credentials.');
                }
            });
            [usernameInput, passwordInput].forEach((input) => {
                input.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') loginBtn.click();
                });
            });
        })();

        const ROSTER_STORAGE_KEY = 'timetable_roster';
        const ADMIN_LOGIN_SESSION_KEY = 'timetable_admin_login_complete';
        const LOGIN_SESSION_SUPPRESS_KEY = 'timetable_teacher_session_suppressed';
        const ADMIN_ACCOUNT_STORAGE_KEY = 'timetable_admin_account';
        const DEFAULT_ADMIN_USERNAME = '@Admin';

        let currentView = 'dashboard';
        let currentRoster = getEmptyRoster();

        function getEmptyRoster() {
            return {
                teachers: [],
                private: [],
                speakon: [],
                passport: [],
                studentSchools: {},
                teacherEmails: {},
                teacherPasswords: {},
                customSchools: [],
                studentTeachers: {},
                studentEmails: {},
                studentUsernames: {},
                studentPasswords: {},
                studentCities: {},
                studentCountries: {},
                studentPhones: {},
                studentBirthDates: {},
                studentAges: {},
                studentLevels: {},
                gateStaffAccounts: [],
                supervisionLinks: [],
                authLoginAliases: {},
                adminAccount: { username: '', passwordHash: '' }
            };
        }

        /**
         * Loads the latest roster from KV (Bearer required) into localStorage cache.
         * @returns {Promise<boolean>}
         */
        async function refreshRosterFromAuthoritativeServerIntoPage() {
            try {
                const auth = window.TimeTableAuthVerifyGate ? window.TimeTableAuthVerifyGate.timetableBearerAuthHeaders() : {};
                const bearer = auth && String(auth.Authorization || '').trim();
                if (!bearer) return false;
                const res = await fetch('/api/roster?t=' + Date.now(), {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', ...auth },
                    cache: 'no-store'
                });
                if (!res.ok) return false;
                const data = await res.json().catch(() => null);
                const roster = data?.roster && typeof data.roster === 'object' && !Array.isArray(data.roster) ? data.roster : null;
                if (!roster) return false;
                if (window.TimeTableAuthMigrate?.migrateRosterAuthFields(roster)) {
                    /* migrated in place */
                }
                saveRosterRaw(roster);
                const account =
                    roster.adminAccount && typeof roster.adminAccount === 'object' && roster.adminAccount.username
                        ? {
                              username: String(roster.adminAccount.username || '').trim(),
                              passwordHash: String(roster.adminAccount.passwordHash || '').trim()
                          }
                        : null;
                if (account && account.username && account.passwordHash) {
                    try {
                        localStorage.setItem(ADMIN_ACCOUNT_STORAGE_KEY, JSON.stringify(account));
                    } catch (_) {
                        /* ignore */
                    }
                }
                return true;
            } catch (e) {
                console.warn('admin roster pull', e);
                return false;
            }
        }

        /**
         * Writes the full roster blob to KV via the admin Bearer (authoritative save).
         */
        async function persistAuthoritativeRosterToServer(raw) {
            try {
                const auth = window.TimeTableAuthVerifyGate ? window.TimeTableAuthVerifyGate.timetableBearerAuthHeaders() : {};
                const bearer = auth && String(auth.Authorization || '').trim();
                if (!bearer) return false;
                const res = await fetch('/api/roster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...auth },
                    body: JSON.stringify({ roster: raw })
                });
                if (!res.ok) {
                    console.warn('admin roster POST failed', res.status);
                    return false;
                }
                return true;
            } catch (e) {
                console.warn('admin roster POST', e);
                return false;
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function asArray(value) {
            return Array.isArray(value) ? value.map((item) => String(item || '').trim()).filter(Boolean) : [];
        }

        function asObject(value) {
            return value && typeof value === 'object' && !Array.isArray(value) ? value : {};
        }

        function loadRoster() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ROSTER_STORAGE_KEY) || 'null');
                if (!parsed || typeof parsed !== 'object') return getEmptyRoster();
                const base = getEmptyRoster();
                /** Spread preserves ancillary keys (`supervisionLinks`, themes, aliases, schedules metadata, …). */
                const merged = { ...base, ...parsed };
                merged.teachers = asArray(parsed.teachers ?? merged.teachers);
                merged.private = asArray(parsed.private ?? merged.private);
                merged.speakon = asArray(parsed.speakon ?? merged.speakon);
                merged.passport = asArray(parsed.passport ?? merged.passport);
                merged.studentSchools = asObject(parsed.studentSchools ?? merged.studentSchools);
                merged.teacherEmails = asObject(parsed.teacherEmails ?? merged.teacherEmails);
                merged.teacherPasswords = asObject(parsed.teacherPasswords ?? merged.teacherPasswords);
                merged.customSchools = asArray(parsed.customSchools ?? merged.customSchools);
                merged.studentTeachers = asObject(parsed.studentTeachers ?? merged.studentTeachers);
                merged.studentEmails = asObject(parsed.studentEmails ?? merged.studentEmails);
                merged.studentUsernames = asObject(parsed.studentUsernames ?? merged.studentUsernames);
                merged.studentPasswords = asObject(parsed.studentPasswords ?? merged.studentPasswords);
                merged.studentCities = asObject(parsed.studentCities ?? merged.studentCities);
                merged.studentCountries = asObject(parsed.studentCountries ?? merged.studentCountries);
                merged.studentPhones =
                    parsed.studentPhones && typeof parsed.studentPhones === 'object' && !Array.isArray(parsed.studentPhones)
                        ? { ...parsed.studentPhones }
                        : merged.studentPhones || {};
                merged.studentBirthDates = asObject(parsed.studentBirthDates ?? merged.studentBirthDates);
                merged.studentAges = asObject(parsed.studentAges ?? merged.studentAges);
                merged.studentLevels = asObject(parsed.studentLevels ?? merged.studentLevels);
                merged.supervisionLinks = Array.isArray(parsed.supervisionLinks) ? parsed.supervisionLinks : merged.supervisionLinks || [];
                merged.authLoginAliases =
                    parsed.authLoginAliases && typeof parsed.authLoginAliases === 'object' && !Array.isArray(parsed.authLoginAliases)
                        ? { ...parsed.authLoginAliases }
                        : merged.authLoginAliases || {};
                merged.adminAccount =
                    parsed.adminAccount && typeof parsed.adminAccount === 'object' && !Array.isArray(parsed.adminAccount)
                        ? { ...parsed.adminAccount }
                        : merged.adminAccount || base.adminAccount;
                merged.gateStaffAccounts = Array.isArray(parsed.gateStaffAccounts)
                    ? parsed.gateStaffAccounts
                          .map((e) => ({
                              profileName: String(e?.profileName || '').trim(),
                              username: String(e?.username || '').trim(),
                              password: String(e?.password || '').trim(),
                              appRole: String(e?.appRole || '').trim()
                          }))
                          .filter((e) => e.profileName && e.username && e.password && e.appRole)
                    : [];
                return merged;
            } catch {
                return getEmptyRoster();
            }
        }

        function loadRosterRaw() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ROSTER_STORAGE_KEY) || 'null');
                return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            } catch {
                return {};
            }
        }

        function saveRosterRaw(raw) {
            try {
                localStorage.setItem(ROSTER_STORAGE_KEY, JSON.stringify(raw));
            } catch (e) {
                console.error(e);
            }
        }

        function ensureRosterObject(raw, key) {
            if (!raw[key] || typeof raw[key] !== 'object' || Array.isArray(raw[key])) raw[key] = {};
            return raw[key];
        }

        function ensureRosterStudentList(raw, listKey) {
            if (!Array.isArray(raw[listKey])) raw[listKey] = [];
            return raw[listKey];
        }

        function getStudentSchoolKeyFromRaw(raw, studentName, listKey) {
            const saved = String(ensureRosterObject(raw, 'studentSchools')[studentName] || '').trim().toLowerCase();
            if (saved) return saved;
            if (listKey === 'speakon') return 'speakon';
            if (listKey === 'passport') return 'passport';
            return 'hometeachers';
        }

        function deleteStudentFieldRaw(raw, fieldKey, studentName) {
            const o = raw[fieldKey];
            if (!o || typeof o !== 'object' || Array.isArray(o)) return;
            const q = String(studentName || '').trim().toLowerCase();
            Object.keys(o).forEach((k) => {
                if (String(k || '').trim().toLowerCase() === q) delete o[k];
            });
        }

        function deleteStudentFromRosterAdmin(raw, studentName, listKey) {
            const arr = ensureRosterStudentList(raw, listKey);
            const q = String(studentName || '').trim().toLowerCase();
            const i = arr.findIndex((n) => String(n || '').trim().toLowerCase() === q);
            if (i === -1) return false;
            arr.splice(i, 1);
            return true;
        }

        const ADMIN_STUDENT_FIELD_KEYS = [
            'studentSchools',
            'studentTeachers',
            'studentEmails',
            'studentUsernames',
            'studentPasswords',
            'studentCities',
            'studentCountries',
            'studentPhones',
            'studentGoogleMeetLinks',
            'passportLinks',
            'studentExternalFollowUpLinks',
            'studentBirthDates',
            'studentAges',
            'studentLevels'
        ];

        function deleteStudentCompletelyFromRosterAdmin(raw, studentName) {
            const q = String(studentName || '').trim().toLowerCase();
            if (!q) return false;
            let removed = false;
            ['private', 'speakon', 'passport'].forEach((listKey) => {
                if (deleteStudentFromRosterAdmin(raw, studentName, listKey)) removed = true;
            });
            if (!removed) return false;
            ADMIN_STUDENT_FIELD_KEYS.forEach((fieldKey) => deleteStudentFieldRaw(raw, fieldKey, studentName));
            const swc = raw.speakonWeeklyClass;
            if (swc && typeof swc === 'object' && !Array.isArray(swc)) {
                Object.keys(swc).forEach((k) => {
                    if (String(k || '').trim().toLowerCase() === q) delete swc[k];
                });
            }
            return true;
        }

        function stripUnusedCustomSchoolProfilesAdmin(raw) {
            const used = new Set();
            ['private', 'speakon', 'passport'].forEach((listKey) => {
                ensureRosterStudentList(raw, listKey).forEach((name) => {
                    used.add(getStudentSchoolKeyFromRaw(raw, name, listKey));
                });
            });
            raw.customSchools = asArray(raw.customSchools).filter((school) => {
                const sk = String(school || '').trim().toLowerCase();
                if (!sk) return false;
                if (used.has(sk)) return true;
                ['schoolExternalLinks', 'schoolThemeColors', 'schoolBillingModels', 'schoolBillingConfigs'].forEach((k) => {
                    deleteStudentFieldRaw(raw, k, sk);
                });
                if (raw.googleMeetSharedLinkModeBySchool && typeof raw.googleMeetSharedLinkModeBySchool === 'object') {
                    delete raw.googleMeetSharedLinkModeBySchool[sk];
                }
                if (raw.classReportCollapsedBySchool && typeof raw.classReportCollapsedBySchool === 'object') {
                    delete raw.classReportCollapsedBySchool[sk];
                }
                return false;
            });
        }

        function deleteTeacherAdmin(raw, teacherNameQuery) {
            const q = String(teacherNameQuery || '').trim().toLowerCase();
            if (!q) return;
            const arr = Array.isArray(raw.teachers) ? raw.teachers : [];
            const found = arr.find((t) => String(t || '').trim().toLowerCase() === q);
            if (!found) return;
            raw.teachers = arr.filter((t) => String(t || '').trim().toLowerCase() !== q);
            deleteStudentFieldRaw(raw, 'teacherEmails', found);
            deleteStudentFieldRaw(raw, 'teacherPasswords', found);
            if (Array.isArray(raw.supervisionLinks)) {
                raw.supervisionLinks = raw.supervisionLinks.filter(
                    (l) => String(l?.teacherProfile || '').trim().toLowerCase() !== q
                );
            }
            const st = ensureRosterObject(raw, 'studentTeachers');
            const toRemove = [];
            ['private', 'speakon', 'passport'].forEach((listKey) => {
                ensureRosterStudentList(raw, listKey).forEach((studentName) => {
                    if (String(st[studentName] || '').trim().toLowerCase() === q) {
                        toRemove.push({ name: studentName, listKey });
                    }
                });
            });
            toRemove.forEach(({ name }) => deleteStudentCompletelyFromRosterAdmin(raw, name));
            stripUnusedCustomSchoolProfilesAdmin(raw);
        }

        function deleteSchoolAdmin(raw, displayTitle) {
            const schoolKey = String(displayTitle || '').trim().toLowerCase();
            if (!schoolKey) return;
            const toRemove = [];
            ['private', 'speakon', 'passport'].forEach((listKey) => {
                ensureRosterStudentList(raw, listKey).forEach((studentName) => {
                    if (getStudentSchoolKeyFromRaw(raw, studentName, listKey) === schoolKey) {
                        toRemove.push(studentName);
                    }
                });
            });
            toRemove.forEach((studentName) => deleteStudentCompletelyFromRosterAdmin(raw, studentName));
            raw.customSchools = asArray(raw.customSchools).filter((s) => String(s || '').trim().toLowerCase() !== schoolKey);
            ['schoolExternalLinks', 'schoolThemeColors', 'schoolBillingModels', 'schoolBillingConfigs'].forEach((k) => {
                deleteStudentFieldRaw(raw, k, schoolKey);
            });
            if (raw.googleMeetSharedLinkModeBySchool && typeof raw.googleMeetSharedLinkModeBySchool === 'object') {
                delete raw.googleMeetSharedLinkModeBySchool[schoolKey];
            }
        }

        function deleteGateStaffRaw(raw, profileNameQuery, expectedAppRole) {
            const q = String(profileNameQuery || '').trim().toLowerCase();
            if (!q) return;
            const arr = Array.isArray(raw.gateStaffAccounts) ? raw.gateStaffAccounts : [];
            const idx = arr.findIndex((e) => String(e?.profileName || '').trim().toLowerCase() === q);
            if (idx === -1) return;
            const ent = arr[idx];
            if (String(ent?.appRole || '').trim() !== expectedAppRole) return;

            if (expectedAppRole === 'class-supervisor' && Array.isArray(raw.supervisionLinks)) {
                raw.supervisionLinks = raw.supervisionLinks.filter((l) => {
                    if (String(l?.superiorProfile || '').trim().toLowerCase() !== q) return true;
                    return String(l?.superiorAppRole || '').trim() !== 'class-supervisor';
                });
            }

            arr.splice(idx, 1);
            raw.gateStaffAccounts = arr;
        }

        async function applyAdminProfileDeletion(role, name) {
            const raw = loadRosterRaw();
            if (role === 'Teacher') deleteTeacherAdmin(raw, name);
            else if (role === 'School') deleteSchoolAdmin(raw, name);
            else if (role === 'Student') {
                deleteStudentCompletelyFromRosterAdmin(raw, name);
            } else if (role === 'GateCoordinator') deleteGateStaffRaw(raw, name, 'coordinator');
            else if (role === 'GateClassSupervisor') deleteGateStaffRaw(raw, name, 'class-supervisor');
            else if (role === 'GateTeacherAssistant') deleteGateStaffRaw(raw, name, 'assistant');
            saveRosterRaw(raw);
            currentRoster = loadRoster();
            await persistAuthoritativeRosterToServer(raw);
        }

        const ADMIN_REMOVE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" /></svg>`;

        function loadAdminName() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ADMIN_ACCOUNT_STORAGE_KEY) || 'null');
                return String(parsed?.username || DEFAULT_ADMIN_USERNAME).trim() || DEFAULT_ADMIN_USERNAME;
            } catch {
                return DEFAULT_ADMIN_USERNAME;
            }
        }

        function getAllStudents() {
            return [
                ...currentRoster.private.map((name) => ({ name, kind: 'private' })),
                ...currentRoster.speakon.map((name) => ({ name, kind: 'speakon' })),
                ...currentRoster.passport.map((name) => ({ name, kind: 'passport' }))
            ].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
        }

        function normalizeScheduleMode(raw) {
            const m = String(raw || '').trim().toLowerCase();
            if (m === 'weekly' || m === 'speakon') return 'weekly';
            if (m === 'classonly' || m === 'class-only' || m === 'passport') return 'classOnly';
            return 'standard';
        }

        function rosterKindFromSchoolProfile(schoolTitle) {
            const key = String(schoolTitle || '').trim().toLowerCase();
            const profiles = currentRoster.schoolScheduleProfiles || {};
            const mode = normalizeScheduleMode(profiles[key]?.mode);
            if (mode === 'weekly') return 'speakon';
            if (mode === 'classOnly') return 'passport';
            return 'private';
        }

        function getRegisteredSchoolTitles() {
            const schools = new Set();
            Object.values(currentRoster.studentSchools || {}).forEach((s) => {
                const t = String(s || '').trim();
                if (t) schools.add(t);
            });
            (currentRoster.customSchools || []).forEach((s) => {
                const t = String(s || '').trim();
                if (t) schools.add(t);
            });
            return [...schools].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
        }

        function getStudentSchoolName(student) {
            const saved = String(currentRoster.studentSchools[student.name] || '').trim();
            if (saved) return saved;
            const wantMode =
                student.kind === 'speakon' ? 'weekly' : student.kind === 'passport' ? 'classOnly' : 'standard';
            const profiles = currentRoster.schoolScheduleProfiles || {};
            for (const title of getRegisteredSchoolTitles()) {
                const key = title.toLowerCase();
                if (normalizeScheduleMode(profiles[key]?.mode) === wantMode) return title;
            }
            return getRegisteredSchoolTitles()[0] || '';
        }

        function getSchoolSummaries() {
            const schools = new Map();
            getAllStudents().forEach((student) => {
                const title = getStudentSchoolName(student);
                const key = title.toLowerCase();
                if (!schools.has(key)) schools.set(key, { title, students: [] });
                schools.get(key).students.push(student.name);
            });
            currentRoster.customSchools.forEach((title) => {
                const key = title.toLowerCase();
                if (!schools.has(key)) schools.set(key, { title, students: [] });
            });
            return [...schools.values()].sort((a, b) => a.title.localeCompare(b.title, undefined, { sensitivity: 'base' }));
        }

        function dashboardPasswordHtml(value) {
            const v = String(value || '').trim();
            if (!v) return '<em>Not set</em>';
            if (v.startsWith('sha256$')) return '<em>Stored as hash — set a new password to replace it</em>';
            return escapeHtml(v);
        }

        function adminDashboardMetaLine(label, innerHtml, missing) {
            const cls = missing ? ' admin-dashboard-item-meta--missing' : '';
            const lbl = missing ? `${escapeHtml(label)}:*` : `${escapeHtml(label)}:`;
            return `<span class="admin-dashboard-item-meta${cls}">${lbl} ${innerHtml}</span>`;
        }

        function adminDigitsOnly(s) {
            return String(s || '').replace(/\D/g, '');
        }

        function adminSanitizeNationalDigits(countryIso, digitString) {
            let d = adminDigitsOnly(digitString);
            const iso = String(countryIso || '').trim().toUpperCase();
            if (iso === 'IE' && d.length === 10 && d.startsWith('0')) d = d.slice(1);
            return d;
        }

        function adminFormatBrazilNational(d) {
            const digits = String(d || '').replace(/\D/g, '').slice(0, 11);
            if (!digits) return '';
            if (digits.length <= 2) return `(${digits}`;
            if (digits.length <= 6) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
            if (digits.length <= 10) {
                return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6)}`;
            }
            return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
        }

        function adminFormatNanpNational(d) {
            const digits = String(d || '').replace(/\D/g, '').slice(0, 10);
            if (!digits) return '';
            if (digits.length <= 3) return `(${digits}`;
            if (digits.length <= 6) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
            return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
        }

        function adminFormatNationalForPanel(countryIso, rawLocalInput) {
            const iso = String(countryIso || '').trim().toUpperCase();
            const d = adminSanitizeNationalDigits(iso, rawLocalInput);
            if (!d) return '';
            if (iso === 'BR') return adminFormatBrazilNational(d);
            if (iso === 'US' || iso === 'CA') return adminFormatNanpNational(d);
            if (iso === 'IE') {
                if (d.length <= 2) return `(${d}`;
                if (d.length <= 5) return `(${d.slice(0, 2)}) ${d.slice(2)}`;
                return `(${d.slice(0, 2)}) ${d.slice(2, 5)} ${d.slice(5)}`;
            }
            if (iso === 'GB') {
                if (d.length <= 2) return `(${d}`;
                if (d.length <= 6) return `(${d.slice(0, 2)}) ${d.slice(2)}`;
                if (d.length === 9) return `(${d.slice(0, 2)}) ${d.slice(2, 5)} ${d.slice(5)}`;
                const cap = Math.min(d.length, 10);
                const dd = d.slice(0, cap);
                if (dd.length >= 10) return `(${dd.slice(0, 2)}) ${dd.slice(2, 6)} ${dd.slice(6, 10)}`;
                return `(${dd.slice(0, 2)}) ${dd.slice(2)}`;
            }
            return d.replace(/(.{4})/g, '$1 ').trim();
        }

        /** @type {Record<string, string>} */
        const ADMIN_PHONE_DIAL_BY_ISO = { BR: '+55', US: '+1', GB: '+44', IE: '+353', CA: '+1' };

        function formatAdminStudentPhoneDisplay(studentName) {
            const phones = currentRoster.studentPhones || {};
            const raw = phones[studentName];
            if (!raw || typeof raw !== 'object') return '';
            const iso = String(raw.countryIso || 'BR').trim().toUpperCase();
            const num = String(raw.number || '').trim();
            if (!adminDigitsOnly(num)) return '';
            const dial = ADMIN_PHONE_DIAL_BY_ISO[iso] || '';
            const national = adminFormatNationalForPanel(iso, num);
            if (!national) return dial || '';
            return dial ? `${dial} ${national}` : national;
        }

        function renderStats() {
            const stats = [
                ['Teachers', currentRoster.teachers.length],
                ['Schools', getSchoolSummaries().length],
                ['Students', getAllStudents().length]
            ];
            return `<div class="admin-stats">${stats.map(([label, value]) => `
                <div class="admin-stat-card">
                    <span class="admin-stat-value">${value}</span>
                    <span class="admin-stat-label">${label}</span>
                </div>
            `).join('')}</div>`;
        }

        function renderTeacherRows() {
            if (!currentRoster.teachers.length) return '<p class="admin-dashboard-empty">No teacher profiles yet.</p>';
            return currentRoster.teachers
                .slice()
                .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }))
                .map((name) => {
                    const loginUser = String(currentRoster.teacherEmails[name] || '').trim();
                    const rawPw = String(currentRoster.teacherPasswords[name] || '').trim();
                    return `<div class="admin-dashboard-item">
                        <span class="admin-dashboard-item-title">${escapeHtml(name)}</span>
                        ${adminDashboardMetaLine('Username', loginUser ? escapeHtml(loginUser) : '<em>Not set</em>', !loginUser)}
                        ${adminDashboardMetaLine('Password', dashboardPasswordHtml(currentRoster.teacherPasswords[name]), !rawPw)}
                        <button type="button" class="admin-dashboard-item-remove" data-admin-delete="1" data-admin-role="Teacher" data-admin-name="${escapeHtml(name)}" aria-label="Remove teacher profile">
                            <div class="admin-dashboard-button-remove">${ADMIN_REMOVE_SVG}</div>
                        </button>
                    </div>`;
                }).join('');
        }

        function renderGateStaffRows(appRoleFilter) {
            const list = (currentRoster.gateStaffAccounts || []).filter(
                (e) => String(e.appRole || '').trim() === appRoleFilter
            );
            if (!list.length) {
                const emptyByRole = {
                    coordinator: '<p class="admin-dashboard-empty">No coordinator profiles yet.</p>',
                    'class-supervisor': '<p class="admin-dashboard-empty">No class supervisor profiles yet.</p>',
                    assistant: '<p class="admin-dashboard-empty">No teacher assistant profiles yet.</p>'
                };
                return emptyByRole[appRoleFilter] || '<p class="admin-dashboard-empty">No profiles yet.</p>';
            }
            const dashRoleByFilter = {
                coordinator: 'GateCoordinator',
                'class-supervisor': 'GateClassSupervisor',
                assistant: 'GateTeacherAssistant'
            };
            const dashRole = dashRoleByFilter[appRoleFilter] || 'GateStaff';
            return list
                .slice()
                .sort((a, b) =>
                    String(a.profileName || '').localeCompare(String(b.profileName || ''), undefined, {
                        sensitivity: 'base'
                    })
                )
                .map((e) => {
                    const name = String(e.profileName || '').trim();
                    const loginUser = String(e.username || '').trim();
                    const rawPw = String(e.password || '').trim();
                    return `<div class="admin-dashboard-item">
                        <span class="admin-dashboard-item-title">${escapeHtml(name)}</span>
                        ${adminDashboardMetaLine('Username', loginUser ? escapeHtml(loginUser) : '<em>Not set</em>', !loginUser)}
                        ${adminDashboardMetaLine('Password', dashboardPasswordHtml(e.password), !rawPw)}
                        <button type="button" class="admin-dashboard-item-remove" data-admin-delete="1" data-admin-role="${dashRole}" data-admin-name="${escapeHtml(name)}" aria-label="Remove gate staff profile">
                            <div class="admin-dashboard-button-remove">${ADMIN_REMOVE_SVG}</div>
                        </button>
                    </div>`;
                })
                .join('');
        }

        function renderSchoolRows() {
            const schools = getSchoolSummaries();
            if (!schools.length) return '<p class="admin-dashboard-empty">No schools yet.</p>';
            return schools
                .map(({ title, students }) => {
                    const count = students.length;
                    const listItems = students.length
                        ? `${students.map((n) => `<li>${escapeHtml(n)}</li>`).join('')}`
                        : '';
                    const listBlock = listItems
                        ? `<ul class="admin-school-student-list">${listItems}</ul>`
                        : '<p class="admin-dashboard-item-meta admin-dashboard-item-meta--missing" style="margin:8px 0 0">Students:* <em>Not set</em></p>';
                    return `<div class="admin-dashboard-item">
                    <span class="admin-dashboard-item-title">${escapeHtml(title)}</span>
                    <span class="admin-dashboard-item-meta">Number of students: ${count}</span>
                    <span class="admin-dashboard-item-meta">Students</span>
                    ${listBlock}
                    <button type="button" class="admin-dashboard-item-remove" data-admin-delete="1" data-admin-role="School" data-admin-name="${escapeHtml(title)}" aria-label="Remove school profile">
                        <div class="admin-dashboard-button-remove">${ADMIN_REMOVE_SVG}</div>
                    </button>
                </div>`;
                })
                .join('');
        }

        function renderStudentRows() {
            const students = getAllStudents();
            if (!students.length) return '<p class="admin-dashboard-empty">No students yet.</p>';
            return students
                .map((student) => {
                    const name = student.name;
                    const username = String(currentRoster.studentUsernames[name] || '').trim();
                    const teacher = String(currentRoster.studentTeachers[name] || '').trim();
                    const schoolName = getStudentSchoolName(student);
                    const city = String(currentRoster.studentCities[name] || '').trim();
                    const country = String(currentRoster.studentCountries[name] || '').trim();
                    const local = [city, country].filter(Boolean).join(', ');
                    const phoneDisp = formatAdminStudentPhoneDisplay(name);
                    const birth = String((currentRoster.studentBirthDates && currentRoster.studentBirthDates[name]) || '').trim();
                    const age = String((currentRoster.studentAges && currentRoster.studentAges[name]) || '').trim();
                    const level = String((currentRoster.studentLevels && currentRoster.studentLevels[name]) || '').trim();
                    const schoolMissing = !schoolName || schoolName === '—';
                    return `<div class="admin-dashboard-item">
                    <span class="admin-dashboard-item-title">${escapeHtml(name)}</span>
                    ${adminDashboardMetaLine('Username', username ? escapeHtml(username) : '<em>Not set</em>', !username)}
                    ${adminDashboardMetaLine('Password', dashboardPasswordHtml(currentRoster.studentPasswords[name]), !String(currentRoster.studentPasswords[name] || '').trim())}
                    ${adminDashboardMetaLine('Phone number', phoneDisp ? escapeHtml(phoneDisp) : '<em>Not set</em>', !phoneDisp)}
                    ${adminDashboardMetaLine('Local', local ? escapeHtml(local) : '<em>Not set</em>', !local)}
                    ${adminDashboardMetaLine('Assigned teacher', teacher ? escapeHtml(teacher) : '<em>Not set</em>', !teacher)}
                    ${adminDashboardMetaLine('Assigned school', schoolMissing ? '<em>Not set</em>' : escapeHtml(schoolName), schoolMissing)}
                    ${adminDashboardMetaLine('Birthday', birth ? escapeHtml(birth) : '<em>Not set</em>', !birth)}
                    ${adminDashboardMetaLine('Age', age ? escapeHtml(age) : '<em>Not set</em>', !age)}
                    ${adminDashboardMetaLine('Level', level ? escapeHtml(level) : '<em>Not set</em>', !level)}
                    <button type="button" class="admin-dashboard-item-remove" data-admin-delete="1" data-admin-role="Student" data-admin-name="${escapeHtml(name)}" aria-label="Remove student profile">
                        <div class="admin-dashboard-button-remove">${ADMIN_REMOVE_SVG}</div>
                    </button>
                </div>`;
                })
                .join('');
        }

        function sectionClass(sectionView) {
            return currentView === 'dashboard' || currentView === sectionView ? '' : ' is-hidden';
        }

        function sectionClassTeachersAssistantsRow() {
            return currentView === 'dashboard' ||
                currentView === 'teachers' ||
                currentView === 'teacher-assistant'
                ? ''
                : ' is-hidden';
        }

        function teachersSubcolClass() {
            return currentView === 'dashboard' || currentView === 'teachers' ? '' : ' is-hidden';
        }

        function assistantsSubcolClass() {
            return currentView === 'dashboard' || currentView === 'teacher-assistant' ? '' : ' is-hidden';
        }

        function titleForView(view) {
            const labels = {
                dashboard: 'Dashboard',
                teachers: 'Teachers',
                coordinator: 'Coordinator',
                'class-supervisor': 'Class Supervisor',
                'teacher-assistant': 'Teacher Assistant',
                schools: 'Schools',
                students: 'Students',
                classes: 'Classes',
                payments: 'Payments',
                report: 'Report',
                settings: 'Settings',
                'audit-logs': 'Audit Logs'
            };
            if (labels[view]) return labels[view];
            return view[0].toUpperCase() + view.slice(1).replaceAll('-', ' ');
        }

        function renderDashboard() {
            const adminName = loadAdminName();
            document.getElementById('adminMain').innerHTML = `
                <div class="admin-panel-header">
                    <h2 class="admin-panel-title">${escapeHtml(titleForView(currentView))}</h2>
                </div>
                ${renderStats()}
                <div class="admin-dashboard-grid">
                    <section class="admin-dashboard-category${sectionClass('coordinator')}">
                        <h3 class="admin-dashboard-category-title">Coordinator</h3>
                        <div class="admin-dashboard-category-body">${renderGateStaffRows('coordinator')}</div>
                    </section>
                    <section class="admin-dashboard-category${sectionClass('class-supervisor')}">
                        <h3 class="admin-dashboard-category-title">Class Supervisor</h3>
                        <div class="admin-dashboard-category-body">${renderGateStaffRows('class-supervisor')}</div>
                    </section>
                    <section class="admin-dashboard-category${sectionClassTeachersAssistantsRow()}">
                        <h3 class="admin-dashboard-category-title">Teachers &amp; teacher assistants</h3>
                        <div class="admin-dashboard-category-body admin-dashboard-category-body--two-col">
                            <div class="admin-dashboard-subcol${teachersSubcolClass()}">
                                <h4 class="admin-dashboard-subcol-title">Teachers</h4>
                                ${renderTeacherRows()}
                            </div>
                            <div class="admin-dashboard-subcol${assistantsSubcolClass()}">
                                <h4 class="admin-dashboard-subcol-title">Teacher assistants</h4>
                                ${renderGateStaffRows('assistant')}
                            </div>
                        </div>
                    </section>
                    <hr class="admin-dashboard-divider${currentView === 'dashboard' ? '' : ' is-hidden'}" aria-hidden="true" />
                    <section class="admin-dashboard-category${sectionClass('schools')}">
                        <h3 class="admin-dashboard-category-title">Schools</h3>
                        <div class="admin-dashboard-category-body">${renderSchoolRows()}</div>
                    </section>
                    <section class="admin-dashboard-category${sectionClass('students')}">
                        <h3 class="admin-dashboard-category-title">Students</h3>
                        <div class="admin-dashboard-category-body">${renderStudentRows()}</div>
                    </section>
                </div>
            `;
        }

        function renderPlaceholder(view) {
            document.getElementById('adminMain').innerHTML = `
                <div class="admin-panel-header">
                    <div>
                        <h2 class="admin-panel-title">${escapeHtml(titleForView(view))}</h2>
                        <p class="admin-panel-subtitle">Loads roster data from the database when available; otherwise cached local roster.</p>
                    </div>
                </div>
                <div class="admin-placeholder">Use Dashboard, Coordinators, Class Supervisors, Teachers, Teacher Assistants, Schools, or Students to view registered records.</div>
            `;
        }

        function setActiveView(view) {
            currentView = view;
            document.querySelectorAll('[data-view]').forEach((btn) => {
                btn.classList.toggle('is-active', btn.getAttribute('data-view') === view);
            });
            if (['dashboard', 'teachers', 'coordinator', 'class-supervisor', 'teacher-assistant', 'schools', 'students'].includes(view)) {
                renderDashboard();
            } else {
                renderPlaceholder(view);
            }
        }

        let adminRosterDeletePending = null;

        function closeAdminRosterDeleteModal() {
            const modal = document.getElementById('adminRosterDeleteModal');
            if (modal) {
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
            }
            adminRosterDeletePending = null;
        }

        function openAdminRosterDeleteModal(role, name, title, message) {
            adminRosterDeletePending = { role, name };
            const titleEl = document.getElementById('adminRosterDeleteTitle');
            const bodyEl = document.getElementById('adminRosterDeleteBody');
            const modal = document.getElementById('adminRosterDeleteModal');
            if (!titleEl || !bodyEl || !modal) return;
            titleEl.textContent = title;
            bodyEl.textContent = message;
            bodyEl.style.whiteSpace = 'pre-line';
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function buildAdminRosterDeleteMessage(role, name) {
            let confirmMsg = `Delete this ${String(role || '').toLowerCase()} profile?\n\n${name}`;
            if (role === 'Teacher') {
                confirmMsg =
                    `Delete teacher "${name}"?\n\nEvery student assigned to this teacher will be removed. Custom school profiles with no remaining students will be removed. Other teachers are kept.`;
            } else if (role === 'School') {
                confirmMsg = `Delete school "${name}"?\n\nAll students in this school will be removed. Teacher profiles are kept.`;
            } else if (role === 'Student') {
                confirmMsg = `Delete student "${name}"?\n\nSchools and teachers are kept.`;
            } else if (role === 'GateCoordinator') {
                confirmMsg = `Delete coordinator "${name}"?\n\nThis removes only their gate login profile. Teachers, students, schedules, and supervision links stay as they are.`;
            } else if (role === 'GateClassSupervisor') {
                confirmMsg = `Delete class supervisor "${name}"?\n\nThis removes their gate profile and class-supervisor supervision links where they are the superior.`;
            } else if (role === 'GateTeacherAssistant') {
                confirmMsg = `Delete teacher assistant "${name}"?\n\nThis removes only their gate login profile.`;
            }
            return confirmMsg;
        }

        function adminRosterDeleteTitleForRole(role) {
            if (role === 'Teacher') return 'Delete teacher?';
            if (role === 'School') return 'Delete school?';
            if (role === 'Student') return 'Delete student?';
            if (role === 'GateCoordinator') return 'Delete coordinator?';
            if (role === 'GateClassSupervisor') return 'Delete class supervisor?';
            if (role === 'GateTeacherAssistant') return 'Delete teacher assistant?';
            return 'Delete?';
        }

        function setupAdminRosterDeleteModal() {
            const modal = document.getElementById('adminRosterDeleteModal');
            if (!modal || modal.dataset.bound === '1') return;
            modal.dataset.bound = '1';
            document.getElementById('adminRosterDeleteBackdrop')?.addEventListener('click', closeAdminRosterDeleteModal);
            document.getElementById('adminRosterDeleteCancel')?.addEventListener('click', closeAdminRosterDeleteModal);
            document.getElementById('adminRosterDeleteConfirm')?.addEventListener('click', async () => {
                const p = adminRosterDeletePending;
                closeAdminRosterDeleteModal();
                if (p && p.role && p.name) {
                    await applyAdminProfileDeletion(p.role, p.name);
                    renderDashboard();
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Escape') return;
                if (!modal.classList.contains('is-open')) return;
                e.preventDefault();
                closeAdminRosterDeleteModal();
            });
        }

        function setupAdminDashboardDeletes() {
            const main = document.getElementById('adminMain');
            if (!main || main.dataset.deletesBound === '1') return;
            main.dataset.deletesBound = '1';
            main.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-admin-delete]');
                if (!btn) return;
                const role = String(btn.getAttribute('data-admin-role') || '').trim();
                const name = String(btn.getAttribute('data-admin-name') || '').trim();
                if (!role || !name) return;
                openAdminRosterDeleteModal(
                    role,
                    name,
                    adminRosterDeleteTitleForRole(role),
                    buildAdminRosterDeleteMessage(role, name)
                );
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            window.addEventListener('storage', (e) => {
                if (e.storageArea !== localStorage) return;
                if (e.key !== 'timetable_logout_broadcast_ts' || e.newValue == null) return;
                try {
                    sessionStorage.removeItem(ADMIN_LOGIN_SESSION_KEY);
                    sessionStorage.setItem(LOGIN_SESSION_SUPPRESS_KEY, '1');
                } catch {
                    /* ignore */
                }
                window.location.href = 'login-screen.html';
            });

            let allow = false;
            if (window.TimeTableAuthVerifyGate) {
                allow = await window.TimeTableAuthVerifyGate.timetableEnsureAdminApiAccess({
                    adminSessionKey: ADMIN_LOGIN_SESSION_KEY,
                    loginPath: 'login-screen.html',
                });
            } else {
                try {
                    allow = sessionStorage.getItem(ADMIN_LOGIN_SESSION_KEY) === 'true';
                } catch {
                    allow = false;
                }
                if (!allow) window.location.href = 'login-screen.html';
            }
            if (!allow) return;
            setupAdminRosterDeleteModal();
            setupAdminDashboardDeletes();

            const adminMainRoot = document.getElementById('adminMain');
            if (adminMainRoot && adminMainRoot.dataset.refreshBound !== '1') {
                adminMainRoot.dataset.refreshBound = '1';
                adminMainRoot.addEventListener('click', async (ev) => {
                    if (!ev.target.closest('#adminRefreshBtn')) return;
                    await refreshRosterFromAuthoritativeServerIntoPage();
                    currentRoster = loadRoster();
                    renderDashboard();
                });
            }

            await refreshRosterFromAuthoritativeServerIntoPage();
            currentRoster = loadRoster();
            setActiveView('dashboard');

            document.querySelectorAll('[data-view]').forEach((btn) => {
                btn.addEventListener('click', () => setActiveView(btn.getAttribute('data-view') || 'dashboard'));
            });

            document.getElementById('adminLogoffBtn')?.addEventListener('click', () => {
                try {
                    localStorage.removeItem('timetable_saved_login_credentials');
                    localStorage.removeItem('timetable_api_bearer_token');
                    sessionStorage.removeItem('timetable_api_bearer_token');
                    localStorage.setItem('timetable_logout_broadcast_ts', String(Date.now()));
                    sessionStorage.removeItem(ADMIN_LOGIN_SESSION_KEY);
                    sessionStorage.setItem(LOGIN_SESSION_SUPPRESS_KEY, '1');
                } catch {
                    /* ignore */
                }
                window.location.href = 'login-screen.html';
            });
        });
    </script>
</body>
</html>

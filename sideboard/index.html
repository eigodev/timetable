<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sideboard</title>

	<!-- CSS | Cascade Style Sheet -->
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<aside class="sidebar">
		<div class="user">
			<div class="avatar">
				<button class="avatar" id="avatarBtn" aria-label="Profile Picture">
					<img id="avatarImage" alt="Profile Picture" hidden>
					<span id="avatarInitials"><!-- Initials --></span>
				</button>
				<input type="file" id="avatarInput" accept="image/*" hidden>
			</div>
			<div class="title">
				<p class="name"><!-- Name --></p>
				<p class="role"><!-- Role --></p>
			</div>
		</div>
	</aside>
	<div class="main-content"></div>
	
	<!-- JS | JavaScript -->
	<script src="script.js"></script>
</body>
</html>
